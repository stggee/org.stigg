<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link rel="stylesheet" href="webjars/bootstrap/5.2.3/css/bootstrap.min.css">
  <script src="webjars/sockjs-client/1.5.1/sockjs.min.js"></script>
  <script src="webjars/stomp-websocket/2.3.4/stomp.min.js"></script>
  <script src="webjars/jquery/3.6.4/jquery.min.js"></script>

  <script src="/js/app.js"></script>
</head>
<body>
<!--Header-->
<div th:replace="~{fragments/header.html}"></div>

<div class="container text-center">
  <div class="row mt-4">
    <div class="col-auto">
      <select id="recipient_select">
        <option value="all">All</option>
        <option th:each="friend : ${friends}" th:text="${friend.name + ' ' + friend.last_name}" th:value="${friend.username}"></option>
      </select>
    </div>

    <div class="col-9">
      <h3>Messages</h3>
    </div>

  </div>

  <div class="row mt-5">
    <div class="col-12">
      <div id="messages_area" class="col-12">

      </div>
    </div>
  </div>




<div class="row g-3 mt-5" style="position: fixed;
                                  display: block ruby;
                                  bottom: 0;
                                  width: 75%;
                                  margin-bottom: 2%;">

  <div class="col-9">
    <div class="input-group ">
      <input type="text" class="form-control" id="message" placeholder="Message">
    </div>
  </div>

  <div class="col-auto">
    <button id="send_msg_btn" class="btn btn-primary w-100" type="submit" >Send</button>
  </div>
</div>


</div>

</div>

<script src="webjars/popper.js/2.9.3/umd/popper.js"></script>
<script src="webjars/bootstrap/5.2.3/js/bootstrap.min.js"></script>
</body>
</html>
